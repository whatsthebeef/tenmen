<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: 'Google Sans', 'Segoe UI', Arial, sans-serif;
      max-width: 480px;
      margin: 80px auto;
      text-align: center;
      padding: 0 20px;
      color: #202124;
    }
    .icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 32px;
    }
    .icon-success { background: #e6f4ea; color: #1a7f37; }
    .icon-info { background: #e8f0fe; color: #1a73e8; }
    .icon-error { background: #fce8e6; color: #c5221f; }
    h1 {
      font-size: 22px;
      font-weight: 500;
      margin: 0 0 12px;
    }
    p {
      color: #5f6368;
      font-size: 15px;
      line-height: 1.6;
      margin: 0 0 24px;
    }
    .back-link {
      display: inline-block;
      padding: 10px 24px;
      background: #1a73e8;
      color: white;
      text-decoration: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
    }
    .back-link:hover { background: #1557b0; }
  </style>
</head>
<body>
  <div class="icon icon-<?= data.icon || 'info' ?>">
    <? if (data.icon === 'success') { ?>&#10003;<? } else if (data.icon === 'error') { ?>&#10007;<? } else { ?>&#8635;<? } ?>
  </div>
  <h1><?= data.title ?></h1>
  <p><?= data.message ?></p>
  <? if (data.docLink) { ?>
    <a class="back-link" href="<?= data.docLink ?>"><?= data.linkText || 'Back to Proposal Doc' ?></a>
  <? } ?>
  <? if (data.secondaryLink) { ?>
    <div style="margin-top: 16px;">
      <a href="<?= data.secondaryLink ?>" style="color: #5f6368; font-size: 13px;"><?= data.secondaryLinkText || '' ?></a>
    </div>
  <? } ?>
</body>
</html>
