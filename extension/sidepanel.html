<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <nav class="view-tabs" id="view-tabs">
    <button class="view-tab active" data-view="patches">Patches</button>
    <button class="view-tab" data-view="tasks">Tasks</button>
    <button class="view-tab" data-view="docs">Docs</button>
    <button class="view-tab view-tab-icon" data-view="settings" title="Settings">&#9881;</button>
  </nav>

  <div class="status-bar" id="status-bar"></div>

  <!-- Patches view -->
  <div class="view" id="view-patches">
    <div class="patch-back" id="patch-back" style="display:none;">
      <button class="patch-back-btn" id="btn-patch-back">&larr; Back to patches</button>
      <button class="patch-index-delete" id="btn-patch-delete" style="float:right;">Delete Patch</button>
    </div>
    <div class="patch-actions" id="patch-actions">
      <button class="action-btn" id="btn-process-summary">Process Meeting Summary</button>
      <button class="action-btn" id="btn-process-feature">Process Feature Document</button>
      <div class="debug-output" id="debug-output" style="display:none;"></div>
    </div>
    <div class="section-header" id="source-section" style="display:none;">
      <div class="section-label">Meeting Summary</div>
      <div class="section-link" id="source-header"></div>
    </div>

    <div id="content">
      <div class="loading" id="loading" style="display:none;">Loading Patches...</div>
      <div class="patch-list" id="patch-list"></div>
      <div id="patch-index"></div>
      <div class="all-done" id="all-done" style="display:none;">All patches reviewed</div>
    </div>
  </div>

  <!-- Tasks view -->
  <div class="view" id="view-tasks" style="display:none;">
    <div class="task-filter">
      <input type="text" id="task-filter-input" placeholder="Filter by ID...">
      <button class="task-filter-clear" id="task-filter-clear">&times;</button>
    </div>
    <div class="loading" id="tasks-loading" style="display:none;">Loading Tasks...</div>
    <div id="task-list"></div>
    <div class="all-done" id="tasks-empty" style="display:none;">No tasks found</div>
    <!-- Task detail view -->
    <div id="task-detail" style="display:none;">
      <div class="patch-back" id="task-back">
        <button class="patch-back-btn" id="btn-task-back">&larr; Back to tasks</button>
      </div>
      <div id="task-detail-content"></div>
      <div class="task-detail-actions" style="display:none;">
        <button class="action-btn" id="btn-task-save" style="display:none;">Save</button>
      </div>
      <div class="settings-message" id="task-detail-message" style="display:none;"></div>
    </div>
  </div>

  <!-- Docs view -->
  <div class="view" id="view-docs" style="display:none;">
    <div id="docs-drive-selector" style="display:none;padding:10px 12px;background:#fff;border-bottom:1px solid #e0e0e0;">
      <select id="docs-drive-select" class="task-detail-textarea" style="resize:none;margin:0;"></select>
    </div>
    <div class="loading" id="docs-loading" style="display:none;">Loading Documents...</div>
    <div id="docs-list"></div>
    <div class="all-done" id="docs-empty" style="display:none;">No feature documents found</div>
    <div id="docs-actions">
      <button class="action-btn" id="btn-new-feature-doc">New Feature Document</button>
    </div>
    <!-- Doc detail view -->
    <div id="doc-detail" style="display:none;">
      <div class="patch-back" id="doc-back">
        <button class="patch-back-btn" id="btn-doc-back">&larr; Back to documents</button>
      </div>
      <div id="doc-detail-header"></div>
      <div id="doc-detail-stories"></div>
      <div style="padding:12px;">
        <button class="action-btn" id="btn-add-story" style="display:none;">Add User Story</button>
      </div>
      <div class="settings-message" id="doc-detail-message" style="display:none;"></div>
    </div>
  </div>

  <!-- Settings view -->
  <div class="view" id="view-settings" style="display:none;">

    <div class="settings-panel" id="settings-panel">
      <div class="section-label">Settings</div>
      <div class="settings-field">
        <label>Gemini API Key</label>
        <input type="text" id="setting-gemini-key" placeholder="AIza...">
      </div>
      <div class="settings-field">
        <label>Gemini Model</label>
        <input type="text" id="setting-gemini-model" placeholder="gemini-3-pro-preview">
      </div>
      <div class="section-label" style="margin-top:14px;">Jira</div>
      <div class="settings-field">
        <label>Jira Email</label>
        <input type="text" id="setting-jira-email" placeholder="you@company.com">
      </div>
      <div class="settings-field">
        <label>Jira API Token</label>
        <input type="password" id="setting-jira-token" placeholder="ATATT3x...">
      </div>
      <div class="settings-field">
        <label>Jira Project Key</label>
        <input type="text" id="setting-jira-project" placeholder="TEN">
      </div>
      <div class="section-label" style="margin-top:14px;">Projects</div>
      <div id="settings-projects"></div>
      <div id="add-project-form" style="margin-top:8px;">
        <div class="settings-field">
          <label>Project Name</label>
          <input type="text" id="add-project-name" placeholder="my-project">
        </div>
        <div class="settings-field">
          <label>Shared Drive ID</label>
          <input type="text" id="add-project-drive-id" placeholder="0ABcDeFgHiJk...">
        </div>
        <button class="action-btn" id="btn-add-project" style="margin-bottom:12px;">Add Project</button>
      </div>
      <div class="settings-actions">
        <button class="action-btn" id="btn-save-settings">Save</button>
      </div>
      <div class="settings-message" id="settings-message" style="display:none;"></div>
    </div>

  </div>

  <!-- File browser overlay -->
  <div id="file-browser-overlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;background:#fff;overflow-y:auto;">
    <div style="padding:10px 12px;background:#fff;border-bottom:1px solid #e0e0e0;position:sticky;top:0;">
      <div style="display:flex;align-items:center;gap:8px;">
        <button id="btn-file-browser-cancel" style="background:none;border:none;color:#1a73e8;cursor:pointer;font-size:13px;padding:4px 0;">&larr;</button>
        <input type="text" id="file-browser-search" placeholder="Search Google Drive..." style="flex:1;padding:8px 10px;border:1px solid #dadce0;border-radius:6px;font-size:13px;">
      </div>
      <div id="file-browser-status" style="font-size:11px;color:#5f6368;margin-top:6px;"></div>
    </div>
    <div id="file-browser-results"></div>
  </div>

  <script src="google-api.js"></script>
  <script src="firestore-client.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
