<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body {
      font-family: 'Google Sans', Arial, sans-serif;
      font-size: 13px;
      color: #202124;
      margin: 0;
      padding: 16px;
    }
    h2 { font-size: 16px; margin: 0 0 12px 0; }
    h3 { font-size: 14px; margin: 16px 0 8px 0; color: #5f6368; }

    .no-proposal { color: #5f6368; }
    .proposal-link {
      display: block;
      padding: 8px;
      margin: 4px 0;
      background: #f1f3f4;
      border-radius: 4px;
      text-decoration: none;
      color: #1a73e8;
      cursor: pointer;
    }
    .proposal-link:hover { background: #e8eaed; }

    .change-item {
      padding: 4px 0;
      border-bottom: 1px solid #f1f3f4;
    }

    .approver-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid #f1f3f4;
    }
    .status-approved { color: #1a7f37; font-weight: bold; }
    .status-pending { color: #b45309; }

    .actions {
      margin-top: 20px;
      display: flex;
      gap: 8px;
    }
    button {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-approve {
      background: #1a73e8;
      color: white;
    }
    .btn-approve:hover { background: #1557b0; }
    .btn-approve:disabled {
      background: #dadce0;
      color: #80868b;
      cursor: default;
    }
    .btn-resubmit {
      background: #f1f3f4;
      color: #202124;
    }
    .btn-resubmit:hover { background: #e8eaed; }

    .message {
      margin-top: 12px;
      padding: 10px;
      border-radius: 4px;
      font-size: 12px;
    }
    .message-success { background: #e6f4ea; color: #1a7f37; }
    .message-info { background: #e8f0fe; color: #1a73e8; }
    .message-error { background: #fce8e6; color: #c5221f; }

    #loading { color: #5f6368; padding: 20px 0; }
  </style>
</head>
<body>

  <div id="loading">Loading...</div>

  <div id="not-proposal" style="display:none">
    <h2>Tenmen</h2>
    <p class="no-proposal">Navigate to a Proposal tab to review it.</p>
    <h3>Active Proposals</h3>
    <div id="proposal-list"></div>
    <p id="no-proposals" style="display:none;color:#5f6368;">No active proposals.</p>
  </div>

  <div id="proposal-view" style="display:none">
    <h2 id="proposal-title"></h2>
    <p style="color:#5f6368;font-size:12px;" id="proposal-type-label"></p>

    <h3>Change Summary</h3>
    <div id="change-summary"></div>

    <h3>Approval Status</h3>
    <div id="approver-list"></div>

    <div class="actions">
      <button class="btn-approve" id="btn-approve" onclick="doApprove()">Approve</button>
      <button class="btn-resubmit" id="btn-resubmit" onclick="doResubmit()">Resubmit</button>
    </div>

    <div id="status-message"></div>
  </div>

  <script>
    function init() {
      google.script.run
        .withSuccessHandler(renderSidebar)
        .withFailureHandler(showError)
        .getSidebarData();
    }

    function renderSidebar(data) {
      document.getElementById('loading').style.display = 'none';

      if (!data.isProposal) {
        document.getElementById('not-proposal').style.display = 'block';
        var list = document.getElementById('proposal-list');
        list.innerHTML = '';

        if (!data.proposals.length) {
          document.getElementById('no-proposals').style.display = 'block';
        } else {
          data.proposals.forEach(function(p) {
            var div = document.createElement('div');
            div.className = 'proposal-link';
            div.textContent = p.proposalId;
            div.onclick = function() {
              google.script.host.close();
            };
            list.appendChild(div);
          });
        }
        return;
      }

      document.getElementById('proposal-view').style.display = 'block';
      document.getElementById('proposal-title').textContent = data.proposalId;

      var typeLabel = data.proposalType === 'user_story' ? 'User Story Update' : 'Task List Update';
      document.getElementById('proposal-type-label').textContent = typeLabel + ' for EPIC ' + data.epicId;

      // Change summary
      var summaryDiv = document.getElementById('change-summary');
      summaryDiv.innerHTML = '';
      data.changeSummary.forEach(function(change) {
        var div = document.createElement('div');
        div.className = 'change-item';
        div.textContent = change;
        summaryDiv.appendChild(div);
      });

      renderApprovers(data.approvers, data.currentUserEmail);
    }

    function renderApprovers(approvers, currentEmail) {
      var list = document.getElementById('approver-list');
      list.innerHTML = '';
      var currentApproved = false;

      approvers.forEach(function(a) {
        var div = document.createElement('div');
        div.className = 'approver-row';

        var nameSpan = document.createElement('span');
        nameSpan.textContent = a.email === currentEmail ? a.email + ' (you)' : a.email;

        var statusSpan = document.createElement('span');
        statusSpan.textContent = a.status;
        statusSpan.className = a.status === 'approved' ? 'status-approved' : 'status-pending';

        div.appendChild(nameSpan);
        div.appendChild(statusSpan);
        list.appendChild(div);

        if (a.email === currentEmail && a.status === 'approved') {
          currentApproved = true;
        }
      });

      document.getElementById('btn-approve').disabled = currentApproved;
    }

    function doApprove() {
      var btn = document.getElementById('btn-approve');
      btn.disabled = true;
      btn.textContent = 'Approving...';

      google.script.run
        .withSuccessHandler(onApproveResult)
        .withFailureHandler(showError)
        .sidebarApprove();
    }

    function onApproveResult(result) {
      var btn = document.getElementById('btn-approve');
      btn.textContent = 'Approve';

      if (result.error) {
        showMessage(result.error, 'error');
        return;
      }

      renderApprovers(result.approvers, null);
      btn.disabled = true;

      if (result.applied) {
        showMessage('All approved! Changes have been applied.', 'success');
        document.getElementById('btn-resubmit').style.display = 'none';
      } else {
        showMessage('Your approval has been recorded. Waiting for others.', 'info');
      }
    }

    function doResubmit() {
      var btn = document.getElementById('btn-resubmit');
      btn.disabled = true;
      btn.textContent = 'Resubmitting...';

      google.script.run
        .withSuccessHandler(onResubmitResult)
        .withFailureHandler(showError)
        .sidebarResubmit();
    }

    function onResubmitResult(result) {
      var btn = document.getElementById('btn-resubmit');
      btn.disabled = false;
      btn.textContent = 'Resubmit';

      if (result.error) {
        showMessage(result.error, 'error');
        return;
      }

      renderApprovers(result.approvers, null);
      document.getElementById('btn-approve').disabled = false;
      document.getElementById('btn-approve').textContent = 'Approve';

      showMessage('Proposal resubmitted. All approvers have been notified.', 'info');
    }

    function showMessage(text, type) {
      var div = document.getElementById('status-message');
      div.className = 'message message-' + type;
      div.textContent = text;
    }

    function showError(error) {
      var msg = error && error.message ? error.message : String(error);
      document.getElementById('loading').style.display = 'none';
      showMessage('Error: ' + msg, 'error');
    }

    init();
  </script>
</body>
</html>
